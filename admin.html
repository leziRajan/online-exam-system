<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
<h2>Admin Panel</h2>

<section class="features">

</div>

</div>

</section>

</html>
